<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 700px at 50% 30%, #171b26 0%, #0b0d12 65%);
    font-family: -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
    color: #f2f4f8; text-align: center;
  }
  .stack { opacity: 0; transform: translateY(12px); animation: rise .8s ease-out .3s forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  h1 { font-size: 72px; margin: 0 0 14px; letter-spacing: -1px; }
  .tag { font-size: 32px; color: #8b93a7; margin: 0 0 46px; }
  .repo {
    display: inline-block; font-size: 30px; font-weight: 650; color: #7aa2ff;
    padding: 16px 34px; border: 1.5px solid rgba(122,162,255,.45);
    border-radius: 14px; background: rgba(122,162,255,.08);
  }
  .foot { margin-top: 40px; font-size: 26px; color: #6b7386; }
</style>
</head>
<body>
  <div class="stack">
    <h1>Reader</h1>
    <p class="tag">An attention-management system that lives in your browser.</p>
    <div class="repo">github.com/aakashvardhan/attention-spanner</div>
    <p class="foot">Open source — link in the post below. I'd love your feedback.</p>
  </div>
</body>
</html>
